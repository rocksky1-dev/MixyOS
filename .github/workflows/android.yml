name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode or Generate Debug Keystore
        run: |
          echo "Preparing debug keystore..."
          # Remove any existing debug.keystore to avoid conflicts
          rm -f debug.keystore app/debug.keystore
          
          if [ -s debug.keystore.base64 ]; then
            echo "Decoding debug keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          fi
          
          if [ ! -s debug.keystore ]; then
            echo "Generating a fresh, standard Android debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          
          # Copy to app directory in case build.gradle expects it there
          cp debug.keystore app/debug.keystore || true
          
          echo "Verifying debug keystore file location and size:"
          ls -la debug.keystore
          ls -la app/debug.keystore || echo "app/debug.keystore not present"

      - name: Heal and Regenerate Gradle Wrapper
        run: |
          echo "Regenerating and correcting Gradle wrapper binaries to prevent corruption..."
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MixyOS-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

